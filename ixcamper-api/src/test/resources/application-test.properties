# Test profile configuration
# Override dev profile settings for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable health checks for Ollama in tests
spring.ai.ollama.enabled=false
management.health.ollama.enabled=false

# Disable Spring AI auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration

# Provide test values for environment variables
github.token=test-token

