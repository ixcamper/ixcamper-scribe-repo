spring.application.name=demo
# Prevents startup crash due to Spring AI version mismatch
spring.autoconfigure.exclude=org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/ixcamper_scribe
spring.datasource.username=postgres
spring.datasource.password=password

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

github.token=${GITHUB_TOKEN}

# Explicitly set the Ollama endpoint
spring.ai.ollama.base-url=http://127.0.0.1:11434
spring.ai.ollama.chat.options.model=llama3:latest

# Disable strict health checks for AI on startup
management.health.ollama.enabled=false

# Give Ollama more time to load the model
spring.ai.ollama.client.connect-timeout=10000
spring.ai.ollama.client.read-timeout=60000

# Ensure the context length doesn't overflow memory
spring.ai.ollama.chat.options.num-ctx=2048